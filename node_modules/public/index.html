<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Register</title>
  <link rel="stylesheet" href="style.css" />
  <!-- System fonts only — no external font CDN needed -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <div class="container" id="container">

    <!-- LOGIN FORM -->
    <div class="form-box login" id="loginBox">
      <h2>Login</h2>
      <div class="input-group">
        <input type="text" placeholder="Username" />
        <i class="fa-solid fa-user"></i>
      </div>
      <div class="input-group">
        <input type="password" placeholder="Password" />
        <i class="fa-solid fa-lock"></i>
      </div>
      <a href="#" class="forgot">Forgot Password?</a>
      <button class="btn">Login</button>
      <p class="social-label">or login with social platforms</p>
      <div class="social-icons">
        <a href="#"><i class="fa-brands fa-google"></i></a>
        <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#"><i class="fa-brands fa-github"></i></a>
        <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-box register" id="registerBox">
      <h2>Registration</h2>
      <div class="input-group">
        <input type="text" placeholder="Username" />
        <i class="fa-solid fa-user"></i>
      </div>
      <div class="input-group">
        <input type="email" placeholder="Email" />
        <i class="fa-solid fa-envelope"></i>
      </div>
      <div class="input-group">
        <input type="password" placeholder="Password" />
        <i class="fa-solid fa-lock"></i>
      </div>
      <button class="btn">Register</button>
      <p class="social-label">or register with social platforms</p>
      <div class="social-icons">
        <a href="#"><i class="fa-brands fa-google"></i></a>
        <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#"><i class="fa-brands fa-github"></i></a>
        <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
      </div>
    </div>

    <!-- SLIDING OVERLAY PANEL -->
    <div class="overlay-panel" id="overlayPanel">
      <!-- LEFT side (shown during Register view) -->
      <div class="overlay-content left" id="overlayLeft">
        <h2>Welcome Back!</h2>
        <p>Already have an account?</p>
        <button class="btn outline" id="toLoginBtn">Login</button>
      </div>
      <!-- RIGHT side (shown during Login view) -->
      <div class="overlay-content right" id="overlayRight">
        <h2>Hello, Welcome!</h2>
        <p>Don't have an account?</p>
        <button class="btn outline" id="toRegisterBtn">Register</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
